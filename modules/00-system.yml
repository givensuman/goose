# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
modules:
  - type: dnf
    repos:
      cleanup: false
      nonfree: rpmfusion
    install:
      packages:
        - dnf-plugins-core

  - type: dnf
    repos:
      cleanup: true
      copr:
        - ublue-os/akmods
        - ublue-os/bazzite
        - ublue-os/packages
        - ublue-os/staging
    group-install:
      packages:
        - development-tools
    install:
      packages:
        # Universal Blue
        - uupd
        - ublue-os-media-automount-udev
        - ublue-os-just
        # Miscellaneous
        - binutils
        - bluez
        - firewall-config
        - gdisk
        - gparted
        - git
        - p7zip
        - p7zip-plugins
        - util-linux
        - wl-clipboard
        # Library dependencies
        - glibc-devel
        - libstdc++-devel
        - ncurses-devel
        - readline-devel
        - openssl-devel
        - libffi-devel
        - zlib-devel
        - libcurl-devel
        - expat-devel
        - "@development-tools"
        - "@development-libs"
        - gcc
        - gcc-c++
        - clang
        - make
        - cmake
        - autoconf
        - automake
        - libtool
        - pkg-config
        - git-core
        - curl
        - wget

  - type: systemd
    system:
      enabled:
        # Services installed above
        - uupd.timer
        - podman-auto-update.timer
        - rpm-ostreed-automatic.timer
        - flatpak-system-update.timer
        - bluetooth.service
        # Services in /usr/lib/systemd/system
        - ublue-hostname.service
