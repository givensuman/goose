# .pre-commit-config.yaml

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: shellcheck
        name: Shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        files: \.sh$
        stages: [pre-commit]

      - id: just-fmt
        name: Just format check
        entry: just --unstable --fmt --check -f Justfile
        language: system
        pass_filenames: false
        files: ^(Justfile|.*\.just)$
        stages: [pre-commit]

      - id: actionlint
        name: Lint GitHub Actions workflows
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/
        stages: [pre-commit]

      - id: container-build
        name: Build container image
        entry: just build-container
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
