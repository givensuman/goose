---
name: "build goose linux image"
on:
  pull_request:
    branches:
      - main
    paths:
      - "build_files/**"
      - "system_files/**"
      - "Containerfile"
      - ".github/workflows/build-os.yml"
  schedule:
    - cron: "05 10 * * *"
  push:
    branches:
      - main
      - dev
    paths:
      - "build_files/**"
      - "system_files/**"
      - "Containerfile"
      - ".github/workflows/build-os.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: "goose"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  IMAGE_TAG: "${{ github.ref_name }}"
  PLATFORMS: "linux/amd64,linux/arm64"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: build and push image
    runs-on: ubuntu-24.04
    continue-on-error: false
    permissions:
      contents: read
      security-events: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image: ${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}
      digest: ${{ steps.push.outputs.digest }}
      tags: ${{ steps.generate-tags.outputs.TAGS }}

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Checkout Push to Registry action
        uses: actions/checkout@v4

      - name: Lint scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck build_files/*.sh || { echo "Shellcheck failed"; exit 1; }

      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          TAGS=()
          sha="${GITHUB_SHA::7}"
          timestamp="$(date +%Y%m%d)"

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            tag="stable"
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            tag="dev"
          else
            tag="unknown"
          fi
          echo IMAGE_TAG="$tag" >> "$GITHUB_ENV"

          TAGS+=("${tag}")
          TAGS+=("${sha}")
          TAGS+=("${sha}-${tag}")

          for entry in "${TAGS[@]}"; do
            TAGS+=("${entry}-${timestamp}")
          done

          echo "TAGS=${TAGS[*]}" >> "$GITHUB_OUTPUT"

      - name: Image Metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Reference architecture for bootc-based immutable Linux images
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/main/README.md
            io.artifacthub.package.logo-url=https://raw.githubusercontent.com/${{ github.repository }}/main/assets/goose.png

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Cache dnf and rpm-ostree packages
        uses: actions/cache@v4
        with:
          path: /tmp/buildah-cache
          key: buildah-${{ runner.os }}-${{ hashFiles('build_files/*.sh') }}

      - name: Build multi-arch image
        id: build_image
        shell: bash
        run: |
          mkdir -p /tmp/buildah-cache/libdnf5 /tmp/buildah-cache/rpm-ostree
          buildah manifest create ${{ env.IMAGE_NAME }}:manifest-${{ github.run_id }}
          LABEL_ARGS=()
          while IFS= read -r label; do
            [ -n "$label" ] && LABEL_ARGS+=(--label "$label")
          done <<< "${{ steps.meta.outputs.labels }}"
          buildah build \
            --manifest ${{ env.IMAGE_NAME }}:manifest-${{ github.run_id }} \
            --platform ${{ env.PLATFORMS }} \
            --volume /tmp/buildah-cache/libdnf5:/var/cache/libdnf5 \
            --volume /tmp/buildah-cache/rpm-ostree:/var/cache/rpm-ostree \
            "${LABEL_ARGS[@]}" \
            --format docker \
            .

      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        id: push
        run: |
          DIGEST=""
          for tag in ${{ steps.generate-tags.outputs.TAGS }}; do
            DIGEST=$(buildah manifest push --all \
              ${{ env.IMAGE_NAME }}:manifest-${{ github.run_id }} \
              docker://${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${tag})
          done
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3.8.2

      - name: Sign container image
        run: |
          cosign sign --yes \
            ${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}@${{ steps.push.outputs.digest }}
          artifact-name: goose-sbom.spdx.json
          output-file: /tmp/goose-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: goose-sbom
          path: /tmp/goose-sbom.spdx.json
          if-no-files-found: error

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Cleanup
        if: always()
        run: |
          podman system prune -f
          buildah prune -f

  provenance:
    name: Generate SLSA provenance
    needs: build-and-push
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build-and-push.outputs.image }}
      digest: ${{ needs.build-and-push.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, provenance]
    if: always()
    steps:
      - name: Check Results
        run: |
          if [ "${{ needs.build-and-push.result }}" != "success" ] || \
             [ "${{ needs.provenance.result }}" != "success" ]; then
            echo "Some checks failed"
            exit 1
          fi
