---
name: "Pull Request Checks"
on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  lint:
    name: Lint Shell Scripts and Just Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck build_files/*.sh || { echo "Shellcheck failed"; exit 1; }

      - name: Check Just syntax
        run: |
          sudo apt-get install -y just
          just just_check

  review:
    name: Run Security and Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: "${{ github.event.repository.default_branch }}"
          head: HEAD
          extra_args: --only-verified

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: true

  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Container
        run: |
          podman build --tag localhost/goose:pr-test .

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, review, build]
    if: always()
    steps:
      - name: Check Results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.review.result }}" != "success" ]; then
            echo "Some checks failed"
            exit 1
          fi
