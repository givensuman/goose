container_image_default="registry.fedoraproject.org/fedora-toolbox:42"
container_name_default="toolbox"
container_additional_volumes="/nix/store:/nix/store:ro"
container_additional_volumes="/run/current-system:/run/current-system:ro
container_additional_volumes="/etc/static/profiles/per-user:/etc/static/profiles/per-user:ro"
container_additional_volumes="/etc/profiles/per-user:/etc/profiles/per-user:ro"
container_pre_init_hook="export PATH=\$PATH:/run/current-system/sw/bin; export SHELL=$(which fish);"
