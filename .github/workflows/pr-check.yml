---
name: "Pull Request Checks"
on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  lint:
    name: Lint Shell Scripts and Just Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck build_files/*.sh || { echo "Shellcheck failed"; exit 1; }

      - name: Check Just syntax
        run: |
          sudo apt-get install -y just
          just just_check

  build-container:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Container
        run: |
          podman build --tag localhost/goose:pr-test .

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, build-container]
    if: always()
    steps:
      - name: Check Results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build-container.result }}" != "success" ]; then
            echo "Some checks failed"
            exit 1
          fi
          echo "All checks passed!"
